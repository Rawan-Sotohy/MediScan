<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"content="Join Thousands Of Users Imporoving Therir Health With AI-Powerd Tool.">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta http-equiv="X-UA-Compatible" content="IE=7">
        <title>MediScan</title>
        <link rel="stylesheet" href="css/normalize.css">
        <html rel="stylesheet" href="css/all.min.css">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="set">
            <a href="index.html" class="btn-back"><i class="fa fa-arrow-left" aria-hidden="true"></i></a>
            <h1>Settings</h1>
            <div class="container">
                <div class="box">
                    <h2>Preferences</h2>
                    <div class="settings-item">
                        <span>Change Password</span>
                        <button class="arrow">→</button>
                    </div>
            
                    <div class="settings-item">
                        <span>Update Email</span>
                        <button class="arrow">→</button>
                    </div>
            
                    <div class="settings-item">
                        <span>Dark Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="darkMode">
                            <span class="slider"></span>
                        </label>
                    </div>
            
                    <div class="settings-item">
                        <span>Notifications</span>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
            </div>
            <div class="box">
                <h2>Profile Information</h2>
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name">
                <label>Email</label>
                <input type="email" placeholder="example@mail.com">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
                <button class="save-btn">Save Changes</button>
            </div>
            </div>
        </div>
        <script src="js/all.min.js"></script>
        <script src="js/dash.js"></script>
    </body>
</html>
