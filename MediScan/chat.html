<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MediScan AI Chat</title>
<link rel="stylesheet" href="css/all.min.css">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 18px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    font-size: 20px;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.header a {
    margin-right: auto;
    display: flex;
    border: none;
}

/* CHAT AREA */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    max-width: 80%;
    padding: 12px 16px;
    margin-bottom: 15px;
    border-radius: 18px;
    position: relative;
    animation: fadeIn 0.25s ease-in;
}

.message.user {
    background: #22c55e;
    margin-left: auto;
    border-bottom-right-radius: 5px;
    width: 250px;
}

.message.bot {
    background: rgba(255,255,255,0.08);
    border-bottom-left-radius: 5px;
    width: 250px;
}

/* Timestamps */
.message small {
    display: none;
    font-size: 11px;
    opacity: 0.7;
    margin-top: 4px;
}
.message:hover small {
    display: block;
}

/* INPUT AREA */
.input-area {
    display: flex;
    padding: 10px;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border-top: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 14px;
}

.send-btn {
    padding: 0 20px;
    background: #3b82f6;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.25s;
}

.send-btn:hover {
    background: #60a5fa;
}

/* Typing Indicator */
.typing {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    padding-left: 10px;
}

.dot {
    width: 7px;
    height: 7px;
    background: white;
    opacity: 0.6;
    border-radius: 50%;
    animation: blink 1.4s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0% { opacity: .3; }
    20% { opacity: 1; }
    100% { opacity: .3; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}





</style>
</head>

<body>

<div class="header"><a href="index.html" class="btn-back"><i class="fa fa-arrow-left" aria-hidden="true"></i></a> 🩺 MediScan Assistant</div>


<div class="chat-container" id="chatContainer">
    <div class="message bot">
        Hello 👋 I'm your MediScan Medical Assistant.<br>
        How can I help you today?
        <small>AI · now</small>
    </div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Type your message...">
    <button class="send-btn" id="sendBtn">Send</button>
</div>

<script>
const chat = document.getElementById("chatContainer");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.className = "message " + sender;

    const time = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});

    msg.innerHTML = `${text}<br><small>${sender === "user" ? "You" : "AI"} · ${time}</small>`;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    const typing = document.createElement("div");
    typing.className = "typing";
    typing.id = "typing";
    typing.innerHTML = `
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    `;
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

function botReply(userText) {
    showTyping();

    setTimeout(() => {
        hideTyping();

        let reply = "";

        if (userText.includes("dose")) {
            reply = "Based on your medication plan, your next dose is at 8:00 AM.";
        } else if (userText.includes("side effects")) {
            reply = "Common side effects include dizziness, nausea, and headache.";
        } else if (userText.includes("hi")) {
            reply = "Hello,How Can I Help You .";
        } else {
            reply = "Thank you! I'm analyzing your message. Please wait a moment.";
        }

        addMessage(reply, "bot");
    }, 1200);
}

sendBtn.onclick = () => {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    botReply(text);

    input.value = "";
};

input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendBtn.click();
});
</script>

</body>
</html>
