{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"content="Join Thousands Of Users Imporoving Therir Health With AI-Powerd Tool.">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta http-equiv="X-UA-Compatible" content="IE=7">
        <title>MediScan</title>
        <link rel="stylesheet" href="{%  static 'css/normalize.css' %}">
        <link rel="stylesheet" href="{%  static 'css/all.min.css' %}">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
    </head>
    <body>
        <main class="profile">
            <div class="head">
                <a href="{% url 'home' %}" class="btn-back"><i class="fa fa-arrow-left" aria-hidden="true"></i></a>
                <h1>Profile</h1>
            </div>
            <div class="container">
            <div class="boxs">
                <div class="box">
                    <!-- <h3>Profile Picture</h3> -->
                    <img src="{% static 'img/profile.jpg' %}" alt="Profile-image">
                    <a href="#" class="edit">Edit</a>
                </div>
                <div class="box">
                    <h3>Full Name:</h3>
                    <span>{{user.name}}</span>
                    <a href="{%  url 'updateProfile' user.id %}" class="edit"><i class="fas fa-edit    "></i></a>
                </div>
                <div class="box">
                    <h3>Gender:</h3>
                    <span>{{user.gender}}</span>
                    <a href="{%  url 'updateProfile' user.id %}" class="edit"><i class="fas fa-edit    "></i></a>
                </div>
                <div class="box">
                    <h3>Phone Number:</h3>
                    <span>{{user.phone}}</span>
                    <a href="{%  url 'updateProfile' user.id %}" class="edit"><i class="fas fa-edit    "></i></a>
                </div>
                <div class="box">
                    <h3>Age:</h3>
                    <span>{{user.age}}</span>
                    <a href="{%  url 'updateProfile' user.id %}" class="edit"><i class="fas fa-edit    "></i></a>
                </div>
                <div class="box">
                    <h3>Email:</h3>
                    <span>{{user.email}}</span>
                    <a href="{%  url 'updateProfile' user.id %}" class="edit"><i class="fas fa-edit    "></i></a>
                </div>
            </div>
        </div>
    </div>
        <script src="{% static 'js/all.min.js' %}"></script>
        <script src="{% static 'js/main.js' %}"></script>
    </body>
</html>
