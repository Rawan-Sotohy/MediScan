{% load static %}
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Join Thousands Of Users Imporoving Therir Health With AI-Powerd Tool.">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta http-equiv="X-UA-Compatible" content="IE=7">
        <title>MediScan</title>
        <link rel="stylesheet" href="{% static 'css/normalize.css' %}">
        <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <link rel="shortcut icon" href="{% static 'img/logo-2.png' %}" type="image/x-icon">
    </head>
    <body>
        <header class="home-header">
            <div class="container">
                <div class="logo">
                    <a href="{% url 'home' %}"><img src="{% static 'img/logo-2.png' %}" alt="LOGO-image"></a>
                </div>
                <div class="links">
                    <a href="{% url 'logout' %}" class="logout">
                        <i class="fa fa-sign-out-alt"></i>
                        Logout
                    </a>
                </div>
            </div>
        </header>
        <div class="upload">
            <div class="container">
                <div class="content">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                    
                        <h1>Upload</h1>
                        {% if error %}
                        <p style="color:red; margin-top:10px;">
                            {{ error }}
                        </p>
                        {% endif %}

                        <label>
                            <input type="file" name="image" id="imageInput" accept="image/*" required hidden>

                            <div class="file">
                                <i class="fa fa-cloud-upload-alt fa-4x"></i>
                                <h3>Upload Your prescription</h3>
                            </div>
                        </label>
                    
                        <!-- Image Preview -->
                        <div class="preview-container">
                            <img id="previewImage" style="display:none; max-width:300px;">
                        </div>
                    
                        <div class="input">
                            <input type="submit" value="Upload" id="uploadBtn" >
                            <a href="{% url 'homePage' %}" class="back">Back</a>
                        </div>
                    </form>

            </div>
        </div>
        <script>
            const input = document.getElementById( "imageInput" );
            const preview = document.getElementById( "previewImage" );

            input.addEventListener( "change", function ()
            {
                const file = this.files[ 0 ];
                if ( file )
                {
                    const reader = new FileReader();
                    reader.onload = function ( e )
                    {
                        preview.src = e.target.result;
                        preview.style.display = "block";
                    };
                    reader.readAsDataURL( file );
                }
            } );

            
        </script>

        <script src="{% static 'js/all.min.js' %}"></script>
        <script src="{% static 'js/main.js' %}"></script>
    </body>

</html>
