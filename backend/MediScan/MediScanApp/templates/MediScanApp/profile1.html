{% load static %}
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MediScan - Profile</title>
        <link rel="stylesheet" href="{% static 'css/normalize.css' %}">
        <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <link rel="shortcut icon" href="{% static 'img/logo-2.png' %}" type="image/x-icon">
        <style>
            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            .profile {
                padding: 20px;
                min-height: 100vh;
            }

            .head {
                max-width: 1000px;
                margin: 0 auto 30px;
                display: flex;
                align-items: center;
                gap: 20px;
            }

            .btn-back {
                background: white;
                color: #667eea;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                text-decoration: none;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            }

            .btn-back:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            }

            .profile .head a svg {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2em;
    padding: 20px;
    color: #667eea;}

            .head h1 {
                color: white;
                font-size: 36px;
                margin: 0;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            }

            .container {
                max-width: 1000px;
                margin: 0 auto;
            }

            .profile-header {
                background: white;
                border-radius: 20px;
                padding: 40px;
                margin-bottom: 30px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                text-align: center;
            }

            .profile-image-wrapper {
                position: relative;
                display: inline-block;
                margin-bottom: 20px;
            }

            .profile-image-wrapper img {
                width: 150px;
                height: 150px;
                border-radius: 50%;
                object-fit: cover;
                border: 5px solid #667eea;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            }

            .edit-image-btn {
                position: absolute;
                bottom: 10px;
                right: 10px;
                background: #667eea;
                color: white;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                text-decoration: none;
                box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
                transition: all 0.3s ease;
                cursor: pointer;
            }

            .edit-image-btn:hover {
                background: #764ba2;
                transform: scale(1.1);
            }

            .profile-name {
                font-size: 28px;
                color: #333;
                margin: 10px 0 5px;
            }

            .profile-email {
                color: #666;
                font-size: 16px;
            }

            .boxs {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 20px;
            }

            .box {
                background: white;
                border-radius: 15px;
                padding: 25px;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
                transition: all 0.3s ease;
                position: relative;
                border-left: 4px solid #667eea;
            }

            .box:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }

            .box h3 {
                color: #667eea;
                font-size: 14px;
                font-weight: 600;
                margin: 0 0 10px 0;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .box span {
                color: #333;
                font-size: 18px;
                font-weight: 500;
                display: block;
                margin-bottom: 15px;
            }

            .edit {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 8px 20px;
                border-radius: 20px;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-size: 14px;
                transition: all 0.3s ease;
            }

            .edit:hover {
                transform: translateX(5px);
                box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            }

            /* Info Icons */
            .info-icon {
                position: absolute;
                top: 25px;
                right: 25px;
                color: #667eea;
                font-size: 20px;
            }

            /* Animations */
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .box {
                animation: fadeInUp 0.5s ease-out;
            }

            .box:nth-child(2) {
                animation-delay: 0.1s;
            }

            .box:nth-child(3) {
                animation-delay: 0.2s;
            }

            .box:nth-child(4) {
                animation-delay: 0.3s;
            }

            .box:nth-child(5) {
                animation-delay: 0.4s;
            }

            /* Responsive */
            @media (max-width: 768px) {
                .boxs {
                    grid-template-columns: 1fr;
                }

                .head h1 {
                    font-size: 28px;
                }

                .profile-header {
                    padding: 30px 20px;
                }
            }
        </style>
    </head>

    <body>
        <main class="profile">
            <div class="head">
                <a href="{% url 'home' %}" class="btn-back">
                    <i class="fa fa-arrow-left"></i>
                </a>
                <h1>My Profile</h1>
            </div>

            <div class="container">
                <!-- Profile Header with Image -->
                <div class="profile-header">
                    <div class="profile-image-wrapper">
                        <img src="{{user.avater.url}}" alt="Profile Picture">
                        <form action="" method="post">
                            <label>
                                <input type="file" name="img" id="imageInput" accept="image/*" required hidden>
                                <a href="{% url 'updateProfile' user.id %}" class="edit-image-btn">
                                    <i class="fas fa-camera"></i>
                                </a>
                            </label>
                        </form>
                    </div>
                    <h2 class="profile-name">{{ user.name }}</h2>
                    <p class="profile-email">{{ user.email }}</p>
                </div>

                <!-- Profile Information Boxes -->
                <div class="boxs">
                    <div class="box">
                        <i class="fas fa-user info-icon"></i>
                        <h3>Full Name</h3>
                        <span>{{ user.name }}</span>
                        <a href="{% url 'updateProfile' user.id %}" class="edit">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                    </div>

                    <div class="box">
                        <i class="fas fa-envelope info-icon"></i>
                        <h3>Email Address</h3>
                        <span>{{ user.email }}</span>
                        <a href="{% url 'updateProfile' user.id %}" class="edit">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                    </div>

                    <div class="box">
                        <i class="fas fa-phone info-icon"></i>
                        <h3>Phone Number</h3>
                        <span>{{ user.phone }}</span>
                        <a href="{% url 'updateProfile' user.id %}" class="edit">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                    </div>

                    <div class="box">
                        <i class="fas fa-venus-mars info-icon"></i>
                        <h3>Gender</h3>
                        <span>{{ user.gender }}</span>
                        <a href="{% url 'updateProfile' user.id %}" class="edit">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                    </div>

                    <div class="box">
                        <i class="fas fa-birthday-cake info-icon"></i>
                        <h3>Age</h3>
                        <span>{{ user.age }} years old</span>
                        <a href="{% url 'updateProfile' user.id %}" class="edit">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <script src="{% static 'js/all.min.js' %}"></script>
        <script src="{% static 'js/main.js' %}"></script>
    </body>

</html>
