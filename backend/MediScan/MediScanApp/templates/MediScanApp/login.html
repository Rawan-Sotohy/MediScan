<!DOCTYPE html>
{% load static %}
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"content="Join Thousands Of Users Imporoving Therir Health With AI-Powerd Tool.">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta http-equiv="X-UA-Compatible" content="IE=7">
        <title>MediScan</title>
        <link rel="stylesheet" href="{%  static 'css/normalize.css' %}">
        <link rel="stylesheet" href="{%  static 'css/all.min.css' %}">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <link rel="shortcut icon" href="{% static 'img/logo-2.png' %}" type="image/x-icon">
    </head>
    <body>
        <section class="login-container">
            <div class="container">
                <div class="welcome">
                    <form action="" method="POST">
                        {% csrf_token %}
                        <div class="logo">
                            <img src="{% static 'img/logo-2.png' %}" alt="MediScan_Logo">
                        </div>
                        <h1>login</h1>
                        {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                        {% endfor %}
                        {% endif %}
                        <div class="feild">
                            <label for="email">Email:</label>
                            <input type="email" name="email" id="email" value="{{ email }}">
                        </div>
                        <div class="feild">
                            <label for="password">Password:</label>
                            <input type="password" name="password" id="password">
                        </div>
                        <input type="submit" value="Login">
                        <p>Don't Have An Account?<a href="{% url  'register' %}">Create One</a></p>
                    </form>
                </div>
            </div>
        </section>
        <script src="{% static 'js/all.min.js' %}"></script>
        <script src="{% static 'js/main.js' %}"></script>
    </body>
</html>
