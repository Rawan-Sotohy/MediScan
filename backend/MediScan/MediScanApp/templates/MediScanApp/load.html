{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"content="Join Thousands Of Users Imporoving Therir Health With AI-Powerd Tool.">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <meta http-equiv="X-UA-Compatible" content="IE=7">
        <title>MediScan</title>
        <link rel="stylesheet" href="{% static 'css/normalize.css' %}">
        <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <link rel="shortcut icon" href="{% static 'img/logo-2.png' %}" type="image/x-icon">
    </head>
    <body>
        <div class="loading-page">
            <div class="loading-wrapper">
                <div class="glass-card">
                    <div class="loader-ring">
                        <div class="laser"></div>
                    </div>
                    <h2 class="title">Analyzing Image...</h2>
                    <p class="step-text" id="steptext">Initializing...</p>
                </div>
            </div>
        </div>
        <script>
            const steps = [
                    "Uploading Image",
                    "Analyzing Prescription...",
                    "Extracting Medicine Names...",
                    "Reading Dosages...",
                    "Detecting Frequency & Duration...",
                    "Preparing Result..."
                ];

                let index = 0;

                function updateState ()
                {
                    const step = document.getElementById( "steptext" );
                    step.innerText = steps[ index ];
                    index++;

                    if ( index < steps.length )
                    {
                        setTimeout( updateState, 1500 );
                    } else {
                        window.location.href = "{% url 'result' prescription.id %}";
                    }
                }

                updateState();
        </script>

    </body>
</html>
